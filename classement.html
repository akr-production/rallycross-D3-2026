<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classement D3 – Rallycross France 2026</title>
  <meta name="description" content="Classement général pilotes D3, Rallycross France 2026.">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">
        <span class="logo-badge">D3</span>
        Rallycross France 2026
      </a>
      <nav class="site-nav">
        <a href="index.html">Calendrier</a>
        <a href="classement.html" class="active">Classement</a>
      </nav>
    </div>
  </header>

  <main>

    <div class="update-bar" id="update-bar">Chargement…</div>

    <!-- Classement général championnat -->
    <h2 class="section-title">Classement général – D3 2026</h2>

    <div id="championship-empty" class="no-data" hidden>
      <div class="no-data-icon">🏆</div>
      <p>Le classement n'est pas encore disponible.</p>
      <small>Les points seront mis à jour après chaque épreuve.</small>
    </div>

    <div id="championship-wrap" hidden style="overflow-x:auto;margin-bottom:2rem">
      <table class="rankings-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Pilote</th>
            <th>Voiture</th>
            <th>Points</th>
          </tr>
        </thead>
        <tbody id="championship-tbody"></tbody>
      </table>
    </div>

    <!-- Résultats par épreuve -->
    <h2 class="section-title" id="results-title" hidden>Résultats par épreuve</h2>

    <div id="event-results-list"></div>

  </main>

  <footer class="site-footer">
    Rallycross France 2026 – D3 ·
    <a href="https://rallycrossfrance.com" target="_blank" rel="noopener">rallycrossfrance.com</a>
  </footer>

  <script src="assets/classement.js"></script>
</body>
</html>
